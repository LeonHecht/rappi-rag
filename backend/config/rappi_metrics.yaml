metrics:
  "% PRO Users Who Breakeven": "Share of PRO users who reach breakeven economics."
  "% Restaurants Sessions With Optimal Assortment": "Share of restaurant sessions with an assortment considered optimal."
  "Gross Profit UE": "Unit economics gross profit metric."
  "Lead Penetration": "Share or penetration of leads in the operating base."
  "MLTV Top Verticals Adoption": "Adoption of MLTV across top verticals."
  "Non-Pro PTC > OP": "Non-PRO price-to-consumer indicator above operational plan."
  "Perfect Orders": "Share or count of orders completed without operational defects."
  "Pro Adoption": "Adoption rate of the PRO offering."
  "Restaurants Markdowns / GMV": "Restaurant markdown spend as a share of GMV."
  "Restaurants SS > ATC CVR": "Restaurant search-session to add-to-cart conversion rate."
  "Restaurants SST > SS CVR": "Restaurant store-session to search-session conversion rate."
  "Retail SST > SS CVR": "Retail store-session to search-session conversion rate."
  "Turbo Adoption": "Adoption rate of Turbo offering."
